name: Build & Release HorrorGame

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Versión del release (ej: v1.2.0)'
        required: true
        type: string
      prerelease:
        description: '¿Es un pre-release?'
        required: false
        default: false
        type: boolean

jobs:
  # ── Job 1: Verificación de compilación (mismo Docker que build-local.sh) ─
  check:
    name: Compilation Check (Docker)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f Dockerfile.build -t horrorgame-build:latest .

  # ── Job 2: Build y release (solo en workflow_dispatch) ───────────────────
  # NOTE: Windows release build requires SharpDX.Direct3D9 Mesh API fixes.
  # The D3DXCreateMesh wrapper in SharpDX net45 has API differences vs MDX.
  # TODO: Fix Mesh constructor in TgcSceneLoader.cs and related files.
  release:
    name: Release Build (Windows)
    runs-on: windows-latest
    needs: check
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        # Restore only the projects needed for the game (not Examples which has MDX leftovers)
        run: |
          nuget restore TgcViewer\TgcViewer.csproj
          nuget restore AlumnoEjemplos\AlumnoEjemplos.csproj
          nuget restore HorrorGame\HorrorGame.csproj

      - name: Build Release (x86)
        # Build only HorrorGame (+ its dependencies TgcViewer and AlumnoEjemplos)
        # Examples project is excluded - it has MDX leftovers not needed by the game
        run: |
          msbuild HorrorGame\HorrorGame.csproj `
            /p:Configuration=Release `
            /p:Platform=AnyCPU

      - name: Recopilar distributable
        shell: pwsh
        run: |
          $out = "dist\HorrorGame"
          # HorrorGame.csproj uses OutputPath=..\ so binaries go to the repo root
          New-Item -ItemType Directory -Force $out | Out-Null

          # Copy the main executable and DLLs from repo root (OutputPath=..\)
          Copy-Item "HorrorGame.exe"     $out\ -ErrorAction SilentlyContinue
          Copy-Item "TgcViewer.exe"      $out\ -ErrorAction SilentlyContinue
          Copy-Item "TgcViewer.dll"      $out\ -ErrorAction SilentlyContinue
          Copy-Item "AlumnoEjemplos.dll" $out\ -ErrorAction SilentlyContinue
          Copy-Item "HorrorGame.exe.config" $out\ -ErrorAction SilentlyContinue

          # Copy SharpDX and other runtime DLLs from repo root
          Get-ChildItem "." -Filter "SharpDX*.dll" -ErrorAction SilentlyContinue | Copy-Item -Destination $out\
          Copy-Item "Ionic.Zip.dll" $out\ -ErrorAction SilentlyContinue

          # Show what was built
          Write-Host "=== Built files in root ==="
          Get-ChildItem "." -Filter "*.exe" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.Name }
          Get-ChildItem "." -Filter "*.dll" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.Name }

          # Copy game media assets
          New-Item -ItemType Directory -Force "$out\AlumnoEjemplos" | Out-Null
          Copy-Item AlumnoEjemplos\Media -Destination "$out\AlumnoEjemplos\Media" -Recurse

          # Verify at least one file was copied
          $files = Get-ChildItem $out -ErrorAction SilentlyContinue
          Write-Host "=== dist\HorrorGame contents ($($files.Count) files) ===" 
          $files | ForEach-Object { Write-Host $_.Name }

      - name: Crear ZIP
        shell: pwsh
        run: Compress-Archive -Path dist\HorrorGame\* -DestinationPath HorrorGame.zip

      - name: Crear tag y GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          prerelease: ${{ inputs.prerelease }}
          files: HorrorGame.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
