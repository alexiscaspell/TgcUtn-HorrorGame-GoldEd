name: Build & Release HorrorGame

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Versión del release (ej: v1.2.0)'
        required: true
        type: string
      prerelease:
        description: '¿Es un pre-release?'
        required: false
        default: false
        type: boolean

jobs:
  # ── Job 1: Verificación de compilación (mismo Docker que build-local.sh) ─
  check:
    name: Compilation Check (Docker)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f Dockerfile.build -t horrorgame-build:latest .

  # ── Job 2: Build y release (solo en workflow_dispatch) ───────────────────
  # NOTE: Windows release build requires SharpDX.Direct3D9 Mesh API fixes.
  # The D3DXCreateMesh wrapper in SharpDX net45 has API differences vs MDX.
  # TODO: Fix Mesh constructor in TgcSceneLoader.cs and related files.
  release:
    name: Release Build (Windows)
    runs-on: windows-latest
    needs: check
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore TgcViewer.sln

      - name: Diagnose SharpDX Mesh API (net45)
        shell: pwsh
        run: |
          $dll = "$env:USERPROFILE\.nuget\packages\sharpdx.direct3d9\4.2.0\lib\net45\SharpDX.Direct3D9.dll"
          $asm = [System.Reflection.Assembly]::LoadFile($dll)
          $mesh = $asm.GetType("SharpDX.Direct3D9.Mesh")
          $base = $asm.GetType("SharpDX.Direct3D9.BaseMesh")
          Write-Host "=== Mesh Constructors ==="
          $mesh.GetConstructors([System.Reflection.BindingFlags]::Public -bor [System.Reflection.BindingFlags]::NonPublic -bor [System.Reflection.BindingFlags]::Instance) | ForEach-Object { Write-Host ("  ctor(" + ($_.GetParameters() | ForEach-Object { $_.ParameterType.Name + " " + $_.Name } | Join-String -Separator ", ") + ")") }
          Write-Host "=== Mesh Static Methods ==="
          $mesh.GetMethods([System.Reflection.BindingFlags]::Public -bor [System.Reflection.BindingFlags]::Static) | Where-Object { -not $_.Name.StartsWith("op_") } | ForEach-Object { Write-Host ("  " + $_.Name + "(" + ($_.GetParameters() | ForEach-Object { $_.ParameterType.Name + " " + $_.Name } | Join-String -Separator ", ") + ") : " + $_.ReturnType.Name) }
          Write-Host "=== BaseMesh Properties ==="
          $base.GetProperties([System.Reflection.BindingFlags]::Public -bor [System.Reflection.BindingFlags]::Instance) | ForEach-Object { Write-Host ("  " + $_.PropertyType.Name + " " + $_.Name) }
          Write-Host "=== BaseMesh Relevant Methods ==="
          $base.GetMethods([System.Reflection.BindingFlags]::Public -bor [System.Reflection.BindingFlags]::Instance) | Where-Object { $_.Name -match "Face|Vert|Decl|Attr|Clone|Lock|Num" } | ForEach-Object { Write-Host ("  " + $_.ReturnType.Name + " " + $_.Name + "(" + ($_.GetParameters() | ForEach-Object { $_.ParameterType.Name + " " + $_.Name } | Join-String -Separator ", ") + ")") }

      - name: Build Release (x86)
        run: |
          msbuild TgcViewer.sln `
            /p:Configuration=Release `
            /p:Platform="Any CPU"

      - name: Recopilar distributable
        shell: pwsh
        run: |
          $out = "dist\HorrorGame"
          New-Item -ItemType Directory -Force $out | Out-Null

          Copy-Item HorrorGame.exe     $out\ -ErrorAction SilentlyContinue
          Copy-Item TgcViewer.exe      $out\ -ErrorAction SilentlyContinue
          Copy-Item AlumnoEjemplos.dll $out\

          Get-ChildItem -Filter "SharpDX*.dll" | Copy-Item -Destination $out\
          Copy-Item Ionic.Zip.dll      $out\ -ErrorAction SilentlyContinue

          New-Item -ItemType Directory -Force "$out\AlumnoEjemplos" | Out-Null
          Copy-Item AlumnoEjemplos\Media -Destination "$out\AlumnoEjemplos\Media" -Recurse

          Copy-Item TgcViewer.exe.config $out\ -ErrorAction SilentlyContinue

      - name: Crear ZIP
        shell: pwsh
        run: Compress-Archive -Path dist\HorrorGame\* -DestinationPath HorrorGame.zip

      - name: Crear tag y GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          prerelease: ${{ inputs.prerelease }}
          files: HorrorGame.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
